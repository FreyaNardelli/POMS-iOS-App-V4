# XcodeGen spec — run `xcodegen generate` to produce StrideSensors.xcodeproj.
# Docs: https://github.com/yonaskolb/XcodeGen
name: StrideSensors
options:
  bundleIdPrefix: com.stride
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  StrideSensors:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "codemagic.yaml"
          - ".gitignore"
          - ".github"
          - "README.md"
          - "SIDELOAD.md"
          - "test_sender.py"
          - "Support/Info-additions.plist"
          - "build"
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stride.sensors
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"           # iPhone
        SWIFT_VERSION: "5.0"
        # Let Xcode synthesise the Info.plist and inject the keys we need,
        # so there's no manual plist to keep in sync.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Stride receives movement, rotation and heart-rate data from your watch over the local Wi-Fi network."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        # Unsigned by default — Sideloadly / your Apple ID does the signing.
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
