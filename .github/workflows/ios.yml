name: Build unsigned IPA

# Builds an UNSIGNED .ipa on a GitHub-hosted macOS runner. Download the
# artifact, then sign + install it onto your iPhone with Sideloadly (which
# re-signs with your own Apple ID). See SIDELOAD.md for the full walkthrough.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/StrideSensors   # <-- change if the app lives at the repo root
    steps:
      - uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project StrideSensors.xcodeproj \
            -scheme StrideSensors \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/StrideSensors.app Payload/
          zip -r StrideSensors-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrideSensors-unsigned-ipa
          path: ios/StrideSensors/StrideSensors-unsigned.ipa
          if-no-files-found: error
